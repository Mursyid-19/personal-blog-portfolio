<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | My Portfolio Blog</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">MyPortfolio</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
            <button id="theme-toggle">🌙</button>
        </nav>
    </header>

    <main class="container">
        <section class="contact-section">
            <h1>Get In Touch</h1>
            <form class="contact-form">
                <label for="name">Name</label>
                <input type="text" id="name" required placeholder="Your Name">

                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="Your Email Address">

                <label for="message">Message</label>
                <textarea id="message" rows="5" required placeholder="Type your message here..."></textarea>

                <button type="submit" class="btn">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Personal Blog Portfolio.</p>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
